# ==========================================
# PERFIL DE PRODUCCION
# ==========================================
# Este perfil se activa con: --spring.profiles.active=production
# Contiene configuraciones seguras para entorno productivo

# --- Consola H2 DESHABILITADA (SEGURIDAD) ---
spring.h2.console.enabled=false

# --- No mostrar SQL en produccion (rendimiento) ---
spring.jpa.show-sql=false

