<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>500 - Error del Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center min-vh-100"
      style="background-image: radial-gradient(circle, rgba(30,30,10,1) 0%, rgba(0,0,0,1) 100%);">

<div class="text-center p-5" style="border: 2px solid var(--neon-yellow); box-shadow: 0 0 30px var(--neon-yellow); border-radius: 20px; max-width: 600px; background: rgba(0,0,0,0.8);">

  <div style="font-size: 6rem; text-shadow: 0 0 20px var(--neon-yellow);">🔥 500</div>

  <h1 class="text-uppercase fw-bold mb-3" style="color: var(--neon-yellow);">Critical Error</h1>

  <p class="lead text-secondary mb-4">
    ¡Vaya! Nuestros servidores han sufrido un golpe crítico.<br>
    El equipo de desarrollo (tú) ya está investigando el problema.
  </p>

  <div class="d-flex justify-content-center gap-3">
    <a href="/" class="btn btn-neon-yellow-outline px-4 py-2">
      🔄 Intentar de nuevo
    </a>
  </div>
</div>

</body>
</html>
