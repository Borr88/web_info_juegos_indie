<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Nivel No Encontrado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center min-vh-100"

<div class="text-center p-5" style="border: 2px solid var(--neon-blue); box-shadow: 0 0 30px var(--neon-blue); border-radius: 20px; max-width: 600px; background: rgba(0,0,0,0.8);">

    <div style="font-size: 6rem; text-shadow: 0 0 20px var(--neon-blue);">👾 404</div>

    <h1 class="text-uppercase fw-bold mb-3" style="color: var(--neon-blue);">Nivel No Encontrado</h1>

    </p>

    <div class="d-flex justify-content-center gap-3">
        <a href="/" class="btn btn-neon-blue-outline px-4 py-2">

        </a>
        <a href="/contacto" class="btn btn-outline-secondary px-4 py-2">

        </a>
