<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - IndieLovers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-uppercase" style="color: var(--neon-blue);">🛠️ Panel de Control</h1>
        <div>
            <a href="/" class="btn btn-outline-light me-2">🏠 Ir a la Web</a>
            <a href="/admin/nuevo" class="btn btn-neon-green-ghost">
                ➕ Nuevo Juego
            </a>
            <a href="/admin/notificar" class="btn btn-outline-info me-2">
                📨 Enviar Mensaje
            </a>

        </div>
    </div>

    <div class="card bg-dark border-secondary shadow-lg">
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0 align-middle">
                <thead class="text-uppercase" style="background-color: #000; color: var(--neon-purple);">
                <tr>
                    <th class="p-3">ID</th>
                    <th>Portada</th>
                    <th>Título</th>
                    <th>Género</th>
                    <th>Val.</th>
                    <th class="text-center">Estado</th>
                    <th class="text-end pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="juego : ${videojuegos}">
                    <td class="p-3 text-muted" th:text="${juego.id}">1</td>
                    <td>
                        <img th:src="${juego.portadaUrl != null && juego.portadaUrl.startsWith('http') ? juego.portadaUrl : '/uploads/' + juego.portadaUrl}"
                             class="rounded" style="width: 50px; height: 50px; object-fit: cover;">
                    </td>
                    <td class="fw-bold text-light" th:text="${juego.titulo}">Juego</td>
                    <td><span class="badge bg-secondary" th:text="${juego.genero}">RPG</span></td>
                    <td class="text-warning">⭐ <span th:text="${juego.valoracionMedia}">9.5</span></td>

                    <td class="text-center">
                        <span th:if="${juego.esNovedad}" class="badge bg-warning text-dark">🚀 NOVEDAD</span>
                        <span th:unless="${juego.esNovedad}" class="badge bg-secondary text-dark" style="opacity: 0.3;">-</span>
                    </td>
                    <td class="text-end pe-3">
                        <a th:href="@{/admin/editar/{id}(id=${juego.id})}" class="btn btn-sm btn-primary me-1">✏️ Editar</a>
                        <a th:href="@{/admin/borrar/{id}(id=${juego.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Seguro que quieres borrar este juego? 😱');">🗑️ Borrar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
