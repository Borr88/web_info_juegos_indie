<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mis Notificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark bg-dark fixed-top p-0">
    <div class="container-fluid position-relative px-4 py-3" style="background-color: rgba(10, 10, 18, 0.95); border-bottom: 2px solid var(--neon-purple); box-shadow: 0 4px 15px rgba(189, 0, 255, 0.2);">
        <a class="navbar-brand fw-bold text-uppercase me-4" href="/" style="color: var(--neon-blue); letter-spacing: 2px;">
            🎮 IndieLovers
        </a>
        <div class="d-none d-lg-flex align-items-center gap-4 me-auto ms-5">
            <a th:href="@{/#inicio}" class="nav-link-main">Inicio</a>
            <a th:href="@{/#novedades}" class="nav-link-main">Novedades</a>
            <a th:href="@{/#populares}" class="nav-link-main">Populares</a>
            <a th:href="@{/categorias}" class="nav-link-main">Categorías</a>
            <a th:href="@{/#contacto}" class="nav-link-main">Contacto</a>
        </div>
        <div class="d-flex align-items-center gap-3">
            <button sec:authorize="isAnonymous()" class="navbar-toggler navbar-dark neon-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div sec:authorize="isAuthenticated()" th:if="${usuarioGlobal != null}" class="dropdown">
                <img th:src="${usuarioGlobal.imagenUrl != null ? '/uploads/' + usuarioGlobal.imagenUrl : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + usuarioGlobal.nombre}"
                     class="rounded-circle border border-2 border-neon-purple"
                     style="width: 45px; height: 45px; object-fit: cover; cursor: pointer;"
                     data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
            </div>
        </div>
        <div class="offcanvas offcanvas-end neon-sidebar" tabindex="-1" id="menuLateral">
            <div class="offcanvas-header border-bottom border-secondary">
                <h5 class="offcanvas-title text-uppercase fw-bold" style="color: var(--neon-blue);">MENÚ</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column p-4">
                <div sec:authorize="isAuthenticated()" class="d-flex flex-column gap-3">
                    <a href="/perfil" class="btn btn-neon-purple-ghost p-3 rounded-3 d-flex align-items-center gap-3">⚙️ Ajustes Perfil</a>
                    <a href="/favoritos" class="btn btn-neon-purple-ghost p-3 rounded-3 d-flex align-items-center gap-3">❤️ Favoritos</a>
                    <a href="/recomendaciones" class="btn btn-neon-purple-ghost p-3 rounded-3 d-flex align-items-center gap-3">✨ Recomendaciones</a>
                    <a href="/notificaciones" class="btn btn-neon-purple-ghost p-3 rounded-3 d-flex align-items-center gap-3" style="border-color: var(--neon-blue); color: var(--neon-blue);">🔔 Notificaciones</a>
                    <a sec:authorize="hasAuthority('ADMIN')" href="/admin" class="btn btn-neon-red-ghost p-3 rounded-3 d-flex align-items-center gap-3 mt-2">👮‍♂️ PANEL ADMIN</a>
                </div>
                <div sec:authorize="isAuthenticated()" class="mt-auto pt-4">
                    <a href="/logout" class="btn btn-neon-red-ghost w-100">🚪 Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<div style="height: 100px;"></div>

<div class="container my-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-uppercase" style="color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue);">
            🔔 Mis Notificaciones
        </h1>
        <p class="lead text-secondary">Mensajes del equipo y novedades</p>
    </div>

    <div th:if="${notificaciones.isEmpty()}" class="text-center py-5">
        <div class="fs-1 mb-3">📭</div>
        <h3 class="text-muted">No tienes mensajes nuevos.</h3>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div th:each="notif : ${notificaciones}" class="card mb-3 bg-dark border-0 shadow-sm" style="border-left: 4px solid var(--neon-blue) !important;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="card-title mb-0" style="color: var(--neon-blue);" th:text="${notif.asunto}">Asunto</h5>
                        <small class="text-muted" th:text="${#temporals.format(notif.fecha, 'dd-MM-yyyy HH:mm')}">Fecha</small>
                    </div>
                    <p class="card-text text-light" th:text="${notif.mensaje}">Cuerpo del mensaje...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
