<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enviar Notificación - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex justify-content-center align-items-center min-vh-100">

<div class="container" style="max-width: 600px;">
    <div class="card bg-dark border-0 shadow-lg" style="border: 1px solid var(--neon-blue);">
        <div class="card-header bg-transparent border-bottom border-secondary p-4">
            <h3 class="text-uppercase m-0" style="color: var(--neon-blue);">📧 Enviar Mensaje Oficial</h3>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/admin/enviar-notificacion}" method="post">

                <div class="mb-3">
                    <label class="form-label text-secondary">Destinatario</label>
                    <select name="usuarioId" class="form-select bg-dark text-light border-secondary" required>
                        <option value="" disabled selected>Selecciona un usuario...</option>
                        <option th:each="user : ${usuarios}" th:value="${user.id}" th:text="${user.nombre} + ' (' + ${user.email} + ')'"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary">Asunto</label>
                    <input type="text" name="asunto" class="form-control bg-dark text-light border-secondary" placeholder="Ej: Advertencia sobre comportamiento..." required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary">Mensaje</label>
                    <textarea name="mensaje" rows="5" class="form-control bg-dark text-light border-secondary" placeholder="Escribe el cuerpo del mensaje..." required></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/admin" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-neon-blue-outline">📨 Enviar Correo y Alerta</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
