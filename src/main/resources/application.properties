spring.application.name=proyecto-final
server.port=9001

# --- Configuracion Base de Datos H2 ---
spring.datasource.url=jdbc:h2:file:./data/indiedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${H2_USERNAME:sa}
spring.datasource.password=${H2_PASSWORD:password}

# --- Configuracion Consola H2 ---
# La consola H2 se habilita/deshabilita via perfil de Spring (development/production)
# Para usar: --spring.profiles.active=development
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

# --- CONFIGURACI�N EMAIL (GMAIL) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:frameworksborisbg@gmail.com}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true